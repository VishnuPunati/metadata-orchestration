services:
  db:
    image: postgres:15
    container_name: metadata-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metadata_etl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-metadata_etl}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  mock-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metadata-mock-api
    command: python api/mock_api.py
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metadata-orchestrator
    command: python -m orchestrator.main
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-metadata_etl}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RUN_ONCE: ${RUN_ONCE:-true}
      ORCHESTRATOR_INTERVAL_SECONDS: ${ORCHESTRATOR_INTERVAL_SECONDS:-300}
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      mock-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; raise SystemExit(0 if Path('/tmp/orchestrator.ready').exists() else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  pgdata:
